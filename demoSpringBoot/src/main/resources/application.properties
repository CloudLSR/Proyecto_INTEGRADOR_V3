# ═══════════════════════════════════════════════════════
#  SweetCreamPink — application.properties
# ═══════════════════════════════════════════════════════

# ── Servidor ────────────────────────────────────────────
server.port=8081

# ── Base de datos MySQL ─────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/reposteria?useSSL=false&serverTimezone=America/Lima&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ─────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# ── JWT ─────────────────────────────────────────────────
# IMPORTANTE: cambia este secreto por uno seguro en produccion
jwt.secret=SweetCreamPinkSuperSecretKey2024RepostriaLima!@#
jwt.expiration=86400000
# Token de recuperacion de contrasena: 15 minutos
jwt.reset-expiration=900000

# ── Correo (Gmail SMTP) ─────────────────────────────────
# Activa "Acceso de aplicaciones menos seguras" o usa App Password
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=tu_correo@gmail.com
spring.mail.password=tu_app_password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ── CORS ────────────────────────────────────────────────
cors.allowed-origins=http://localhost:3000

# ── Subida de archivos ───────────────────────────────────
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
uploads.directory=uploads/

# ── Logback ─────────────────────────────────────────────
logging.level.com.SweetCreamPink=DEBUG
logging.level.org.springframework.security=INFO
logging.file.name=logs/sweetcreampink.log