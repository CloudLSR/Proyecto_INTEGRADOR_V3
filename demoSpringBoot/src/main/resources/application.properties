# ═══════════════════════════════════════════════════════════════
#  Sweet Cream Rose — application.properties
#  Ruta: demoSpringBoot/src/main/resources/application.properties
# ═══════════════════════════════════════════════════════════════

# ── Servidor ────────────────────────────────────────────────────
server.port=8081

# ── Base de datos MySQL ─────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/reposteria?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ─────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ── CORS ────────────────────────────────────────────────────────
cors.allowed-origins=http://localhost:3000

# ── JWT ─────────────────────────────────────────────────────────
# la clave debe tener mínimo 256 bits (32 caracteres ASCII)
# para que Keys.hmacShaKeyFor() no lance WeakKeyException.
jwt.secret=SweetCreamRose2024ClaveSeguraMinima256Bits!!XYZ
# 24 horas en milisegundos
jwt.expiration=86400000
# 15 minutos en milisegundos (para token de reset de contraseña)
jwt.reset-expiration=900000

# ── PIN de administrador ─────────────────────────────────────────
# Cambiar en producción. Se compara en AdminAuthController.
admin.pin=SweetCream2024!

# ── Logging ─────────────────────────────────────────────────────
logging.level.com.SweetCreamPink=INFO
logging.level.org.springframework.security=WARN

uploads.directory=C:/uploads/productos/