# ── Servidor ────────────────────────────────────────────────────
server.port=8081

# ── Base de datos MySQL ─────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/reposteria?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ─────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ── CORS ────────────────────────────────────────────────────────
cors.allowed-origins=http://localhost:3000

# ── JWT ─────────────────────────────────────────────────────────
# la clave debe tener mínimo 256 bits (32 caracteres ASCII)
# para que Keys.hmacShaKeyFor() no lance WeakKeyException.
jwt.secret=SweetCreamRose2024ClaveSeguraMinima256Bits!!XYZ
# 24 horas en milisegundos
jwt.expiration=86400000
# 15 minutos en milisegundos (para token de reset de contraseña)
jwt.reset-expiration=900000

# ── PIN de administrador ─────────────────────────────────────────
# Cambiar en producción. Se compara en AdminAuthController.
admin.pin=SweetCream2024!

# ── Logging ─────────────────────────────────────────────────────
logging.level.com.SweetCreamPink=INFO
logging.level.org.springframework.security=WARN

uploads.directory=C:/uploads/

# Aumenta el límite de subida de archivos
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Por si acaso: el conector Tomcat embebido también tiene su propio límite
server.tomcat.max-swallow-size=15MB

# ── Configuración de correo (Gmail SMTP) ───────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
# Leer credenciales desde variables de entorno por seguridad
spring.mail.username=espinozajeremy432@gmail.com
spring.mail.password=udyr jzxf opvo jvlc
spring.mail.protocol=smtp
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
# Requerir STARTTLS y confiar en el host de Gmail
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000

# ── URL base del frontend para armar el enlace de recuperación ──
app.frontend-url=http://localhost:3000

# ── Imágenes estáticas del catálogo (opcional, solo desarrollo local) ──
catalog.assets.directory=

# ── Actuator / Prometheus ───────────────────────────────────────
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=when_authorized
management.endpoint.prometheus.enabled=true
management.metrics.tags.application=sweetcream-backend

# ── Cron jobs (expresiones Spring: seg min hora día mes día-semana) ──
app.cron.desactivar-ofertas=0 0 0 * * *
app.cron.activar-ofertas=0 5 0 * * *
app.cron.limpiar-tokens=0 0 * * * *
app.cron.cancelar-pedidos=0 0 6 * * *
app.cron.dias-pedido-pendiente=7